<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Maintenance & Checkup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .shadow-lg { box-shadow: none !important; }
            .page-break { page-break-before: always; }
        }
        /* Styling khusus tampilan laporan */
        .report-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .report-table th { background-color: #f0f0f0; }
        .signature-section { margin-top: 40px; display: flex; justify-content: space-between; }
        .signature-box { width: 45%; text-align: center; }
        .signature-space { height: 80px; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">

    <!-- Container Utama -->
    <div id="printableArea" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden p-6 md:p-8">
        
        <!-- Header Laporan (Hanya muncul jelas saat Print/PDF) -->
        <div class="report-header mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 uppercase">Laporan Maintenance</h1>
                <p class="text-sm text-gray-500 mt-1">Formulir Operasional Teknik</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold">Periode: <span id="reportDate">-</span></p>
                <p class="text-xs text-gray-500" id="reportTime">-</p>
            </div>
        </div>

        <form id="mainForm">
            <!-- Info Umum -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-blue-50 p-4 rounded">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-1">Outlet</label>
                    <select id="outlet" class="w-full border border-gray-300 rounded p-2 text-sm" required>
                        <option value="">-- Pilih Outlet --</option>
                        <option value="HS01|Pematangsiantar">HS01|Pematangsiantar</option>
                        <option value="HS02|OCBC">HS02|OCBC</option>
                        <option value="HS03|Marelan">HS03|Marelan</option>
                        <option value="HS04|Berauwe">HS04|Berauwe</option>
                        <option value="HS05|Langsa">HS05|Langsa</option>
                        <option value="HS06|Masjid Raya Baiturahman">HS06|Masjid Raya Baiturahman</option>
                        <option value="HS07|Lhokseumauwe">HS07|Lhokseumauwe</option>
                        <option value="HS08|Beureuen">HS08|Beureuen</option>
                        <option value="HS09|Johor">HS09|Johor</option>
                        <option value="HS10|Hasanuddin">HS10|Hasanuddin</option>
                        <option value="HS11|Glugur">HS11|Glugur</option>
                        <option value="HS12|Halat">HS12|Halat</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-1">Nama Petugas <span class="text-red-500">*</span></label>
                    <input type="text" id="petugas" class="w-full border border-gray-300 rounded p-2 text-sm" placeholder="Nama Anda" required>
                </div>
            </div>

            <!-- Area Dinamis untuk Kategori -->
            <div id="categoriesContainer" class="space-y-6 mb-6"></div>

            <!-- Tombol Tambah Kategori -->
            <button type="button" onclick="addCategoryBlock()" class="no-print w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 hover:border-blue-500 hover:text-blue-500 rounded transition font-semibold">
                + Tambah Kategori Lain
            </button>
        </form>

        <!-- Bagian Tanda Tangan (Hanya muncul di Laporan) -->
        <div class="signature-section mt-12 pt-8 border-t-2 border-gray-300 hidden" id="signatureSection">
            <div class="signature-box">
                <p class="font-bold mb-8">Petugas,</p>
                <div class="signature-space border-b border-black mb-2"></div>
                <p class="font-bold underline" id="signPetugas">_________________</p>
                <p class="text-xs text-gray-500">( Nama Terang )</p>
            </div>
            <div class="signature-box">
                <p class="font-bold mb-8">PIC Toko,</p>
                <div class="signature-space border-b border-black mb-2"></div>
                <p class="font-bold underline" id="signPic">_________________</p>
                <p class="text-xs text-gray-500">( Nama Terang )</p>
            </div>
        </div>
    </div>

    <!-- Tombol Aksi -->
    <div class="max-w-4xl mx-auto mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 no-print">
        <button onclick="resetForm()" class="bg-red-500 hover:bg-red-600 text-white text-sm font-bold py-3 px-2 rounded shadow">
            Reset
        </button>
        <button onclick="toggleDraftQueue()" class="bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-bold py-3 px-2 rounded shadow relative">
            <span id="draftBtnText">Save Draft</span>
            <span id="draftCountBadge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
        </button>
        <button onclick="prepareReport('print')" class="bg-gray-600 hover:bg-gray-700 text-white text-sm font-bold py-3 px-2 rounded shadow">
            Print
        </button>
        <button onclick="prepareReport('pdf')" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-3 px-2 rounded shadow">
            Save PDF
        </button>
    </div>

    <!-- Modal Antrian Draft -->
    <div id="draftModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center no-print">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-lg font-bold mb-4">Antrian Draft (<span id="currentDraftCount">0</span>/3)</h3>
            <div id="draftList" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('draftModal').classList.add('hidden')" class="px-4 py-2 bg-gray-300 rounded">Tutup</button>
                <button onclick="clearAllDrafts()" class="px-4 py-2 bg-red-500 text-white rounded">Hapus Semua</button>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI
        const SCRIPT_URL = 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA'; 
        const MAX_DRAFTS = 3;

        let categoryCount = 0;
        let taskCount = 0;

        window.onload = function() {
            updateDraftBadge();
            addCategoryBlock();
            updateReportTimestamp();
        };

        function updateReportTimestamp() {
            const now = new Date();
            document.getElementById('reportDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('reportTime').innerText = now.toLocaleTimeString('id-ID');
        }

        function addCategoryBlock() {
            categoryCount++;
            const container = document.getElementById('categoriesContainer');
            const blockHTML = `
            <div class="category-block bg-gray-50 p-4 rounded border border-gray-200 relative" id="cat-${categoryCount}">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-md text-blue-800">Kategori #${categoryCount}</h3>
                    ${categoryCount > 1 ? `<button type="button" onclick="removeCategory(${categoryCount})" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-xs font-bold mb-1">Pilih Kategori</label>
                    <select onchange="toggleFields(this)" class="cat-select w-full border border-gray-300 rounded p-2 bg-white text-sm">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="1">1. Pergantian Part</option>
                        <option value="2">2. Maintenance Monthly</option>
                        <option value="3">3. CheckUp Daily</option>
                    </select>
                </div>

                <!-- Container untuk Task Blocks -->
                <div class="task-container space-y-4 mb-4"></div>

                <!-- Tombol Tambah Task -->
                <button type="button" onclick="addTaskBlock(${categoryCount})" class="no-print w-full py-2 bg-blue-100 text-blue-600 hover:bg-blue-200 rounded text-xs font-semibold transition">
                    + Tambah Task
                </button>
                
                <!-- Input PIC Toko (Conditional) -->
                <div class="mt-4 hidden pic-toko-container">
                    <label class="block text-gray-700 text-xs font-bold mb-1">PIC Toko (Opsional)</label>
                    <input type="text" class="pic-toko-input w-full border border-gray-300 rounded p-2 text-sm" placeholder="Nama PIC Toko">
                </div>
            </div>
            `;
            container.insertAdjacentHTML('beforeend', blockHTML);
        }

        function removeCategory(id) {
            document.getElementById(`cat-${id}`).remove();
        }

        function addTaskBlock(categoryId) {
            taskCount++;
            const categoryBlock = document.getElementById(`cat-${categoryId}`);
            const taskContainer = categoryBlock.querySelector('.task-container');
            const selectElement = categoryBlock.querySelector('.cat-select');
            const categoryValue = selectElement.value;

            if (!categoryValue) { alert("Pilih kategori terlebih dahulu!"); return; }

            const taskIndex = taskContainer.children.length + 1;
            const uniqueId = `task-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            
            let fieldsHTML = '';

            if (categoryValue === '1' || categoryValue === '2') {
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative" id="${uniqueId}">
                        <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex}</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">SEBELUM</label>
                                <input type="file" accept="image/*" class="w-full text-xs mb-1" onchange="autoFillTime(this, 'time-before')">
                                <input type="time" class="time-before w-full border p-1 rounded text-xs" required>
                            </div>
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">SESUDAH</label>
                                <input type="file" accept="image/*" class="w-full text-xs mb-1" onchange="autoFillTime(this, 'time-after'); showStatusField('${uniqueId}')">
                                <input type="time" class="time-after w-full border p-1 rounded text-xs" required>
                                
                                <!-- Status Field (Muncul setelah foto sesudah) -->
                                <select class="status-field mt-2 w-full border p-1 rounded text-xs font-bold hidden" required>
                                    <option value="">-- Status --</option>
                                    <option value="Done">Done</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Cancel">Cancel</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `;
            } else if (categoryValue === '3') {
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative" id="${uniqueId}">
                         <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex}</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="bg-gray-50 p-2 rounded border">
                            <label class="block text-xs font-bold text-gray-500 mb-1">CHECK</label>
                            <input type="file" accept="image/*" class="w-full text-xs mb-1" onchange="autoFillTime(this, 'time-check'); showStatusField('${uniqueId}')">
                            <input type="time" class="time-check w-full border p-1 rounded text-xs" required>
                             <select class="status-field mt-2 w-full border p-1 rounded text-xs font-bold hidden" required>
                                <option value="">-- Status --</option>
                                <option value="Done">Done</option>
                                <option value="Pending">Pending</option>
                                <option value="Cancel">Cancel</option>
                            </select>
                        </div>
                    </div>
                `;
            }

            taskContainer.insertAdjacentHTML('beforeend', fieldsHTML);
        }

        // Auto Fill Time saat foto dipilih
        function autoFillTime(inputElement, timeClass) {
            if(inputElement.files && inputElement.files[0]) {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const parent = inputElement.closest('.task-block');
                parent.querySelector(`.${timeClass}`).value = `${hours}:${minutes}`;
            }
        }

        // Munculkan Status Field setelah foto sesudah/check diupload
        function showStatusField(taskId) {
            const taskBlock = document.getElementById(taskId);
            if(taskBlock) {
                const statusField = taskBlock.querySelector('.status-field');
                if(statusField) statusField.classList.remove('hidden');
            }
        }

        function toggleFields(selectElement) {
            const categoryBlock = selectElement.closest('.category-block');
            const taskContainer = categoryBlock.querySelector('.task-container');
            const picContainer = categoryBlock.querySelector('.pic-toko-container');
            
            taskContainer.innerHTML = '';
            const categoryId = categoryBlock.id.split('-')[1];
            addTaskBlock(categoryId);

            // Logic PIC Toko (Hanya Kat 1 & 2)
            if (selectElement.value === '1' || selectElement.value === '2') {
                picContainer.classList.remove('hidden');
            } else {
                picContainer.classList.add('hidden');
            }
        }

        // --- DRAFT QUEUE SYSTEM ---
        function getDrafts() {
            const drafts = localStorage.getItem('maintenanceDraftQueue');
            return drafts ? JSON.parse(drafts) : [];
        }

        function saveToDraftQueue() {
            const data = collectData();
            if (!data) return;

            const drafts = getDrafts();
            if (drafts.length >= MAX_DRAFTS) {
                alert(`Antrian draft penuh (Maks ${MAX_DRAFTS}). Harap kirim atau hapus draft lama.`);
                toggleDraftQueue(); // Show modal
                return;
            }

            data.savedAt = new Date().toISOString();
            data.id = Date.now().toString();
            drafts.push(data);
            
            localStorage.setItem('maintenanceDraftQueue', JSON.stringify(drafts));
            updateDraftBadge();
            alert("Draft disimpan dalam antrian!");
            sendData(data); // Kirim ke sheet juga
        }

        function toggleDraftQueue() {
            const modal = document.getElementById('draftModal');
            const list = document.getElementById('draftList');
            const drafts = getDrafts();
            
            document.getElementById('currentDraftCount').innerText = drafts.length;
            list.innerHTML = '';

            if(drafts.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm text-center">Tidak ada draft tersimpan.</p>';
            } else {
                drafts.forEach((draft, index) => {
                    const date = new Date(draft.savedAt).toLocaleString('id-ID');
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-100 p-2 rounded text-sm">
                            <div>
                                <p class="font-bold">${draft.outlet}</p>
                                <p class="text-xs text-gray-500">${date}</p>
                            </div>
                            <button onclick="deleteDraft(${index})" class="text-red-500 text-xs hover:underline">Hapus</button>
                        </div>
                    `;
                });
            }
            modal.classList.toggle('hidden');
        }

        function deleteDraft(index) {
            const drafts = getDrafts();
            drafts.splice(index, 1);
            localStorage.setItem('maintenanceDraftQueue', JSON.stringify(drafts));
            toggleDraftQueue(); // Refresh modal
            updateDraftBadge();
        }

        function clearAllDrafts() {
            if(confirm('Hapus semua draft?')) {
                localStorage.removeItem('maintenanceDraftQueue');
                toggleDraftQueue();
                updateDraftBadge();
            }
        }

        function updateDraftBadge() {
            const count = getDrafts().length;
            const badge = document.getElementById('draftCountBadge');
            const btnText = document.getElementById('draftBtnText');
            
            if(count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
                btnText.innerText = "Lihat Draft";
            } else {
                badge.classList.add('hidden');
                btnText.innerText = "Save Draft";
            }
        }

        // --- DATA COLLECTION & SUBMISSION ---
        function collectData() {
            const outlet = document.getElementById('outlet').value;
            const petugas = document.getElementById('petugas').value;
            
            if(!outlet || !petugas) { alert("Lengkapi Outlet dan Nama Petugas!"); return null; }

            const blocks = document.querySelectorAll('.category-block');
            let entries = [];
            let hasPicToko = false;
            let picTokoName = "";

            blocks.forEach(block => {
                const select = block.querySelector('.cat-select');
                const category = select.value;
                if(!category) return;

                const categoryName = select.options[select.selectedIndex].text;
                const taskBlocks = block.querySelectorAll('.task-block');
                const picInput = block.querySelector('.pic-toko-input');
                
                if(picInput && picInput.value) {
                    hasPicToko = true;
                    picTokoName = picInput.value;
                }

                taskBlocks.forEach(taskBlock => {
                    const task = taskBlock.querySelector('.task-input').value;
                    if(!task) { alert("Isi Task!"); throw new Error("Task kosong"); }

                    let entry = { category: categoryName, task: task, status: '-' };
                    const inputs = taskBlock.querySelectorAll('input');
                    const statusSelect = taskBlock.querySelector('.status-field');

                    if(statusSelect && !statusSelect.classList.contains('hidden')) {
                        entry.status = statusSelect.value;
                    }

                    if (category === '1' || category === '2') {
                        entry.timeStart = taskBlock.querySelector('.time-before').value || "-";
                        entry.timeEnd = taskBlock.querySelector('.time-after').value || "-";
                    } else if (category === '3') {
                        entry.timeStart = taskBlock.querySelector('.time-check').value || "-";
                        entry.timeEnd = "-";
                    }
                    entries.push(entry);
                });
            });

            if(entries.length === 0) { alert("Isi minimal satu task!"); return null; }

            return { 
                outlet, 
                petugas, 
                picToko: hasPicToko ? picTokoName : "-",
                entries,
                timestamp: new Date().toISOString()
            };
        }

        function sendData(data) {
            const btn = document.querySelector('button[onclick="saveToDraftQueue()"]');
            btn.disabled = true;
            btn.innerText = "Mengirim...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) })
            .then(() => alert("Data terkirim ke Spreadsheet!"))
            .catch(err => alert("Gagal kirim: " + err))
            .finally(() => {
                btn.disabled = false;
                updateDraftBadge();
            });
        }

        // --- REPORT GENERATION ---
        function prepareReport(mode) {
            const data = collectData();
            if(!data) return;

            // Update UI untuk Laporan
            document.getElementById('signatureSection').classList.remove('hidden');
            document.getElementById('signPetugas').innerText = data.petugas;
            document.getElementById('signPic').innerText = data.picToko !== "-" ? data.picToko : "_________________";
            
            // Generate Tabel Laporan
            let tableRows = '';
            data.entries.forEach((item, index) => {
                // Hitung Durasi Sederhana
                let duration = '-';
                if(item.timeStart !== '-' && item.timeEnd !== '-' && item.timeEnd > item.timeStart) {
                    // Logika durasi sederhana (menit)
                    duration = "Lihat Timestamp"; 
                }

                tableRows += `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td>${item.task}<br><span class="text-xs text-gray-500">${item.category}</span></td>
                        <td class="text-center">${item.timeStart}</td>
                        <td class="text-center">${item.timeEnd}</td>
                        <td class="text-center">${duration}</td>
                        <td class="text-center font-bold ${item.status === 'Done' ? 'text-green-600' : 'text-red-600'}">${item.status}</td>
                    </tr>
                `;
            });

            // Inject Tabel ke Area Print (Sebelum Form)
            const reportTableHTML = `
                <div id="dynamicReportTable" class="mb-8">
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th width="5%">No</th>
                                <th>Task</th>
                                <th width="15%">Mulai</th>
                                <th width="15%">Selesai</th>
                                <th width="15%">Durasi</th>
                                <th width="10%">Status</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                    <div class="mt-4 text-sm">
                        <p><strong>Outlet:</strong> ${data.outlet}</p>
                        <p><strong>Petugas:</strong> ${data.petugas}</p>
                        ${data.picToko !== "-" ? `<p><strong>PIC Toko:</strong> ${data.picToko}</p>` : ''}
                    </div>
                </div>
            `;

            const container = document.getElementById('printableArea');
            // Insert table after header
            const header = container.querySelector('.report-header');
            header.insertAdjacentHTML('afterend', reportTableHTML);

            // Sembunyikan elemen form input
            document.querySelectorAll('#mainForm, .no-print').forEach(el => el.style.display = 'none');
            document.getElementById('signatureSection').style.display = 'flex';

            if(mode === 'pdf') {
                const filename = `Laporan_${data.outlet.replace(/\|/g,'_')}_${new Date().toISOString().slice(0,19).replace(/:/g,"-")}.pdf`;
                html2pdf().set({ margin: 0.5, filename: filename, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } })
                .from(container).save().then(() => restoreForm());
            } else {
                window.print();
                setTimeout(() => restoreForm(), 1000);
            }
        }

        function restoreForm() {
            // Hapus tabel dinamis
            const dynamicTable = document.getElementById('dynamicReportTable');
            if(dynamicTable) dynamicTable.remove();

            // Tampilkan kembali form
            document.querySelectorAll('#mainForm, .no-print').forEach(el => el.style.display = '');
            document.getElementById('signatureSection').classList.add('hidden');
            updateReportTimestamp();
        }

        function resetForm() {
            if(confirm("Reset semua data?")) {
                document.getElementById('mainForm').reset();
                document.getElementById('categoriesContainer').innerHTML = '';
                categoryCount = 0;
                taskCount = 0;
                addCategoryBlock();
                restoreForm();
            }
        }
    </script>
</body>
</html>
