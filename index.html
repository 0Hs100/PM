<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Maintenance & Checkup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white;
            }

            .shadow-lg {
                box-shadow: none !important;
            }
        }
    </style>
</head>

<body class="bg-gray-100 p-6 font-sans">

    <!-- Container Utama -->
    <div id="printableArea" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden p-8">

        <div class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Laporan Maintenance & Checkup</h1>
            <p class="text-sm text-gray-500">Silakan isi data di bawah ini.</p>
        </div>

        <form id="mainForm">
            <!-- 1. Pilih Outlet -->
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Pilih Outlet</label>
                <select id="outlet"
                    class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500" required>
                    <option value="">-- Pilih Outlet --</option>
                    <option value="HS01|Pematangsiantar">HS01|Pematangsiantar</option>
                    <option value="HS02|OCBC">HS02|OCBC</option>
                    <option value="HS03|Marelan">HS03|Marelan</option>
                    <option value="HS04|Berauwe">HS04|Berauwe</option>
                    <option value="HS05|Langsa">HS05|Langsa</option>
                    <option value="HS06|Masjid Raya Baiturahman">HS06|Masjid Raya Baiturahman</option>
                    <option value="HS07|Lhokseumauwe">HS07|Lhokseumauwe</option>
                    <option value="HS08|Beureuen">HS08|Beureuen</option>
                    <option value="HS09|Johor">HS09|Johor</option>
                    <option value="HS10|Hasanuddin">HS10|Hasanuddin</option>
                    <option value="HS11|Glugur">HS11|Glugur</option>
                    <option value="HS12|Halat">HS12|Halat</option>
                </select>
            </div>

            <!-- Area Dinamis untuk Kategori -->
            <div id="categoriesContainer" class="space-y-6">
                <!-- Kategori akan ditambahkan di sini via JS -->
            </div>

            <!-- Tombol Tambah Kategori -->
            <button type="button" onclick="addCategoryBlock()"
                class="no-print mt-4 w-full py-2 border-2 border-dashed border-gray-400 text-gray-500 hover:border-blue-500 hover:text-blue-500 rounded transition">
                + Tambah Kategori Lain
            </button>

        </form>
    </div>

    <!-- Tombol Aksi (Tidak tercetak) - Urutan Diubah -->
    <div class="max-w-4xl mx-auto mt-6 grid grid-cols-2 md:grid-cols-4 gap-4 no-print">
        <button onclick="resetForm()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
            Reset
        </button>
        <button onclick="saveDraft()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded">
            Save Draft
        </button>
        <button onclick="window.print()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
            Print
        </button>
        <button onclick="convertPDF()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
            Convert PDF
        </button>
    </div>

    <script>
        // KONFIGURASI: Masukkan URL Apps Script Anda di sini
        const SCRIPT_URL = 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA';

        let categoryCount = 0;
        let taskCount = 0;

        // Inisialisasi: Tambah 1 blok kategori saat load
        window.onload = function () {
            addCategoryBlock();
        };

        function addCategoryBlock() {
            categoryCount++;
            const container = document.getElementById('categoriesContainer');

            const blockHTML = `
            <div class="category-block bg-gray-50 p-4 rounded border border-gray-200 relative" id="cat-${categoryCount}">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg text-blue-800">Kategori #${categoryCount}</h3>
                    ${categoryCount > 1 ? `<button type="button" onclick="removeCategory(${categoryCount})" class="text-red-500 text-sm hover:underline">Hapus Kategori</button>` : ''}
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Pilih Kategori</label>
                    <select onchange="toggleFields(this)" class="cat-select w-full border border-gray-300 rounded p-2 bg-white">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="1">1. Pergantian Part</option>
                        <option value="2">2. Maintenance Monthly</option>
                        <option value="3">3. CheckUp Daily</option>
                    </select>
                </div>

                <!-- Container untuk Task Blocks -->
                <div class="task-container space-y-4 mb-4"></div>

                <!-- Tombol Tambah Task -->
                <button type="button" onclick="addTaskBlock(${categoryCount})" class="no-print w-full py-2 bg-blue-100 text-blue-600 hover:bg-blue-200 rounded text-sm font-semibold transition">
                    + Tambah Task
                </button>
            </div>
            `;

            container.insertAdjacentHTML('beforeend', blockHTML);
        }

        function removeCategory(id) {
            document.getElementById(`cat-${id}`).remove();
        }

        function addTaskBlock(categoryId) {
            taskCount++;
            const categoryBlock = document.getElementById(`cat-${categoryId}`);
            const taskContainer = categoryBlock.querySelector('.task-container');
            const selectElement = categoryBlock.querySelector('.cat-select');
            const categoryValue = selectElement.value;

            if (!categoryValue) {
                alert("Pilih kategori terlebih dahulu!");
                return;
            }

            const taskIndex = taskContainer.children.length + 1;

            let fieldsHTML = '';

            // Logic Field Berdasarkan Kategori
            if (categoryValue === '1' || categoryValue === '2') {
                // 1. Pergantian Part & 2. Maintenance Monthly
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative">
                        <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex} / Deskripsi Pekerjaan</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <!-- Sebelum -->
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">FOTO SEBELUM</label>
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500">
                                <input type="time" class="mt-1 w-full border p-1 rounded text-xs">
                            </div>

                            <!-- Sesudah -->
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">FOTO SESUDAH</label>
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500">
                                <input type="time" class="mt-1 w-full border p-1 rounded text-xs">
                            </div>
                        </div>
                    </div>
                `;
            } else if (categoryValue === '3') {
                // 3. CheckUp Daily
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative">
                        <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex} / Item Check</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="bg-gray-50 p-2 rounded border">
                            <label class="block text-xs font-bold text-gray-500 mb-1">FOTO CHECK & TIMESTAMP</label>
                            <div class="flex gap-2">
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500">
                                <input type="time" class="border p-1 rounded w-28 text-xs">
                            </div>
                        </div>
                    </div>
                `;
            }

            taskContainer.insertAdjacentHTML('beforeend', fieldsHTML);
        }

        function toggleFields(selectElement) {
            const categoryBlock = selectElement.closest('.category-block');
            const taskContainer = categoryBlock.querySelector('.task-container');

            // Clear existing tasks when category changes
            taskContainer.innerHTML = '';

            // Auto add one task block
            const categoryId = categoryBlock.id.split('-')[1];
            addTaskBlock(categoryId);
        }

        // --- FUNGSI ACTION ---

        function collectData() {
            const outlet = document.getElementById('outlet').value;
            if (!outlet) { alert("Pilih Outlet terlebih dahulu!"); return null; }

            const blocks = document.querySelectorAll('.category-block');
            let entries = [];

            blocks.forEach(block => {
                const select = block.querySelector('.cat-select');
                const category = select.value;
                if (!category) return; // Skip jika kategori belum dipilih

                const categoryName = select.options[select.selectedIndex].text;
                const taskBlocks = block.querySelectorAll('.task-block');

                taskBlocks.forEach(taskBlock => {
                    const task = taskBlock.querySelector('.task-input').value;
                    if (!task) { alert("Isi Task pada salah satu kategori!"); throw new Error("Task kosong"); }

                    let entry = {
                        category: categoryName,
                        task: task
                    };

                    const inputs = taskBlock.querySelectorAll('input');

                    // Ambil data berdasarkan tipe kategori
                    if (category === '1' || category === '2') {
                        entry.imgBefore = inputs[0].value ? "Ada Foto" : "-";
                        entry.timeBefore = inputs[1].value || "-";
                        entry.imgAfter = inputs[2].value ? "Ada Foto" : "-";
                        entry.timeAfter = inputs[3].value || "-";
                    } else if (category === '3') {
                        entry.imgCheck = inputs[0].value ? "Ada Foto" : "-";
                        entry.timeCheck = inputs[1].value || "-";
                    }
                    entries.push(entry);
                });
            });

            if (entries.length === 0) { alert("Pilih minimal satu kategori dan isi task!"); return null; }

            return { outlet, entries };
        }

        function sendData() {
            const data = collectData();
            if (!data) return;

            const btnSubmit = document.querySelector('button[onclick="saveDraft()"]');
            const originalText = btnSubmit.innerText;
            btnSubmit.innerText = "Menyimpan...";
            btnSubmit.disabled = true;

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
                .then(response => {
                    alert("Data berhasil disimpan ke Spreadsheet!");
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Gagal menyimpan. Cek koneksi atau URL Script.");
                })
                .finally(() => {
                    btnSubmit.innerText = originalText;
                    btnSubmit.disabled = false;
                });
        }

        function saveDraft() {
            const data = collectData();
            if (data) {
                localStorage.setItem('maintenanceDraft', JSON.stringify(data));
                alert("Draft tersimpan di browser (Local Storage)!");
                sendData();
            }
        }

        function resetForm() {
            if (confirm("Apakah Anda yakin ingin mereset formulir?")) {
                document.getElementById('mainForm').reset();
                document.getElementById('categoriesContainer').innerHTML = '';
                categoryCount = 0;
                taskCount = 0;
                addCategoryBlock();
                localStorage.removeItem('maintenanceDraft');
            }
        }

        function convertPDF() {
            const element = document.getElementById('printableArea');
            const now = new Date();
            const filename = `Laporan_${now.toISOString().slice(0, 19).replace(/:/g, "-")}.pdf`;

            const opt = {
                margin: 0.5,
                filename: filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Sembunyikan tombol hapus & tambah sebelum print/pdf
            document.querySelectorAll('.no-print').forEach(el => el.style.display = 'none');

            html2pdf().set(opt).from(element).save().then(() => {
                document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
            });
        }
    </script>
</body>

</html>
