<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Maintenance & Checkup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white;
            }

            .shadow-lg {
                box-shadow: none !important;
            }

            .page-break {
                page-break-before: always;
            }
        }

        .signature-box {
            border: 1px solid #000;
            width: 200px;
            height: 80px;
            margin: 10px 0;
        }
    </style>
</head>

<body class="bg-gray-100 p-6 font-sans">

    <!-- Container Utama -->
    <div id="printableArea" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden p-8">

        <!-- Header Laporan -->
        <div class="border-b-2 border-gray-800 pb-4 mb-6">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">LAPORAN MAINTENANCE</h1>
                    <p class="text-sm text-gray-500">Form Maintenance & Checkup</p>
                </div>
                <div class="text-right">
                    <p class="text-sm font-semibold">Periode: <span id="reportDate">-</span></p>
                    <p class="text-xs text-gray-500" id="reportTime">-</p>
                </div>
            </div>
        </div>

        <form id="mainForm">
            <!-- Info Outlet & Petugas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Pilih Outlet *</label>
                    <select id="outlet"
                        class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500"
                        required onchange="updateReportHeader()">
                        <option value="">-- Pilih Outlet --</option>
                        <option value="HS01|Pematangsiantar">HS01|Pematangsiantar</option>
                        <option value="HS02|OCBC">HS02|OCBC</option>
                        <option value="HS03|Marelan">HS03|Marelan</option>
                        <option value="HS04|Berauwe">HS04|Berauwe</option>
                        <option value="HS05|Langsa">HS05|Langsa</option>
                        <option value="HS06|Masjid Raya Baiturahman">HS06|Masjid Raya Baiturahman</option>
                        <option value="HS07|Lhokseumauwe">HS07|Lhokseumauwe</option>
                        <option value="HS08|Beureuen">HS08|Beureuen</option>
                        <option value="HS09|Johor">HS09|Johor</option>
                        <option value="HS10|Hasanuddin">HS10|Hasanuddin</option>
                        <option value="HS11|Glugur">HS11|Glugur</option>
                        <option value="HS12|Halat">HS12|Halat</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Nama Petugas *</label>
                    <input type="text" id="petugas" class="w-full border border-gray-300 rounded p-2"
                        placeholder="Nama lengkap petugas" required onchange="updateReportHeader()">
                </div>
            </div>

            <!-- PIC Toko (Conditional) -->
            <div id="picTokoContainer" class="mb-6 hidden">
                <label class="block text-gray-700 text-sm font-bold mb-2">PIC Toko (Opsional)</label>
                <input type="text" id="picToko" class="w-full border border-gray-300 rounded p-2"
                    placeholder="Nama PIC Toko">
            </div>

            <!-- Area Dinamis untuk Kategori -->
            <div id="categoriesContainer" class="space-y-6"></div>

            <!-- Tombol Tambah Kategori -->
            <button type="button" onclick="addCategoryBlock()"
                class="no-print mt-4 w-full py-2 border-2 border-dashed border-gray-400 text-gray-500 hover:border-blue-500 hover:text-blue-500 rounded transition">
                + Tambah Kategori Lain
            </button>

        </form>

        <!-- Template Tanda Tangan (Hanya muncul di Print/PDF) -->
        <div class="hidden print:block mt-12 pt-8 border-t-2 border-gray-800">
            <div class="grid grid-cols-2 gap-12">
                <div class="text-center">
                    <p class="font-bold mb-8">Petugas,</p>
                    <div class="signature-box mx-auto"></div>
                    <p class="font-semibold mt-2" id="signPetugas">_________________</p>
                </div>
                <div class="text-center" id="signPicContainer">
                    <p class="font-bold mb-8">PIC Toko,</p>
                    <div class="signature-box mx-auto"></div>
                    <p class="font-semibold mt-2" id="signPicToko">_________________</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tombol Aksi (Tidak tercetak) -->
    <div class="max-w-4xl mx-auto mt-6 grid grid-cols-1 md:grid-cols-3 gap-4 no-print">
        <button onclick="resetForm()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded">
            🔄 Reset
        </button>
        <button onclick="toggleDraftQueue()"
            class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded" id="draftBtn">
            💾 Save Draft
        </button>
        <button onclick="generateReport()"
            class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded">
            📄 Generate Report (PDF/Print)
        </button>
    </div>

    <!-- Draft Queue Modal -->
    <div id="draftModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-lg font-bold mb-4">📋 Antrian Draft (<span id="draftCount">0</span>/3)</h3>
            <div id="draftList" class="space-y-2 mb-4 max-h-64 overflow-y-auto"></div>
            <div class="flex gap-2">
                <button onclick="saveNewDraft()"
                    class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded">
                    Simpan Draft Baru
                </button>
                <button onclick="closeDraftModal()"
                    class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxP2kc7tuS-bwBcZjuipLYNWe-ljVo2i2R1_OqI2oSsbbI5IYkUx1Pm49roeTZv24ffQ/exec';
        const MAX_DRAFTS = 3;

        let categoryCount = 0;
        let taskCount = 0;

        window.onload = function () {
            addCategoryBlock();
            loadDraftQueue();
            updateReportHeader();
        };

        function updateReportHeader() {
            const now = new Date();
            document.getElementById('reportDate').textContent = now.toLocaleDateString('id-ID', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('reportTime').textContent = now.toLocaleTimeString('id-ID');

            const petugas = document.getElementById('petugas').value;
            const picToko = document.getElementById('picToko').value;

            document.getElementById('signPetugas').textContent = petugas || '_________________';
            document.getElementById('signPicToko').textContent = picToko || '_________________';
        }

        function addCategoryBlock() {
            categoryCount++;
            const container = document.getElementById('categoriesContainer');

            const blockHTML = `
            <div class="category-block bg-gray-50 p-4 rounded border border-gray-200 relative" id="cat-${categoryCount}">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg text-blue-800">Kategori #${categoryCount}</h3>
                    ${categoryCount > 1 ? `<button type="button" onclick="removeCategory(${categoryCount})" class="text-red-500 text-sm hover:underline">Hapus Kategori</button>` : ''}
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Pilih Kategori *</label>
                    <select onchange="toggleFields(this)" class="cat-select w-full border border-gray-300 rounded p-2 bg-white" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option value="1">1. Pergantian Part</option>
                        <option value="2">2. Maintenance Monthly</option>
                        <option value="3">3. CheckUp Daily</option>
                    </select>
                </div>

                <div class="task-container space-y-4 mb-4"></div>

                <button type="button" onclick="addTaskBlock(${categoryCount})" class="no-print w-full py-2 bg-blue-100 text-blue-600 hover:bg-blue-200 rounded text-sm font-semibold transition">
                    + Tambah Task
                </button>
            </div>
            `;

            container.insertAdjacentHTML('beforeend', blockHTML);
            checkPicTokoVisibility();
        }

        function removeCategory(id) {
            document.getElementById(`cat-${id}`).remove();
            checkPicTokoVisibility();
        }

        function checkPicTokoVisibility() {
            const selects = document.querySelectorAll('.cat-select');
            let showPicToko = false;

            selects.forEach(select => {
                if (select.value === '1' || select.value === '2') {
                    showPicToko = true;
                }
            });

            const container = document.getElementById('picTokoContainer');
            if (showPicToko) {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function addTaskBlock(categoryId) {
            taskCount++;
            const categoryBlock = document.getElementById(`cat-${categoryId}`);
            const taskContainer = categoryBlock.querySelector('.task-container');
            const selectElement = categoryBlock.querySelector('.cat-select');
            const categoryValue = selectElement.value;

            if (!categoryValue) {
                alert("Pilih kategori terlebih dahulu!");
                return;
            }

            const taskIndex = taskContainer.children.length + 1;
            const now = new Date();
            const currentTime = now.toTimeString().slice(0, 5);

            let fieldsHTML = '';

            if (categoryValue === '1' || categoryValue === '2') {
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative">
                        <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex} / Deskripsi Pekerjaan *</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">FOTO SEBELUM</label>
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500 photo-before" onchange="autoTimestamp(this, 'before')">
                                <input type="time" class="mt-1 w-full border p-1 rounded text-xs time-before" value="${currentTime}" required>
                            </div>
                            <div class="bg-gray-50 p-2 rounded border">
                                <label class="block text-xs font-bold text-gray-500 mb-1">FOTO SESUDAH</label>
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500 photo-after" onchange="autoTimestamp(this, 'after')">
                                <input type="time" class="mt-1 w-full border p-1 rounded text-xs time-after" value="${currentTime}" required>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Status Pekerjaan *</label>
                            <select class="status-select w-full border p-2 rounded text-sm" required onchange="checkStatusCancel(this)">
                                <option value="">-- Pilih Status --</option>
                                <option value="Done">✅ Done</option>
                                <option value="Pending">⏳ Pending</option>
                                <option value="Cancel">❌ Cancel</option>
                            </select>
                        </div>
                        
                        <div class="cancel-reason hidden">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Alasan Cancel *</label>
                            <textarea class="w-full border p-2 rounded text-sm border-red-300" rows="2" placeholder="Jelaskan alasan pembatalan..."></textarea>
                        </div>
                    </div>
                `;
            } else if (categoryValue === '3') {
                fieldsHTML = `
                    <div class="task-block bg-white p-3 rounded border border-gray-300 relative">
                        <div class="absolute top-2 right-2 no-print">
                            ${taskIndex > 1 ? `<button type="button" onclick="this.closest('.task-block').remove()" class="text-red-500 text-xs hover:underline">Hapus</button>` : ''}
                        </div>
                        
                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Task #${taskIndex} / Item Check *</label>
                            <textarea class="task-input w-full border p-2 rounded text-sm" rows="2" required></textarea>
                        </div>
                        
                        <div class="bg-gray-50 p-2 rounded border mb-3">
                            <label class="block text-xs font-bold text-gray-500 mb-1">FOTO CHECK & TIMESTAMP</label>
                            <div class="flex gap-2">
                                <input type="file" accept="image/*" class="w-full text-xs text-gray-500 photo-check" onchange="autoTimestamp(this, 'check')">
                                <input type="time" class="border p-1 rounded w-28 text-xs time-check" value="${currentTime}" required>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Status Pekerjaan *</label>
                            <select class="status-select w-full border p-2 rounded text-sm" required onchange="checkStatusCancel(this)">
                                <option value="">-- Pilih Status --</option>
                                <option value="Done">✅ Done</option>
                                <option value="Pending">⏳ Pending</option>
                                <option value="Cancel">❌ Cancel</option>
                            </select>
                        </div>
                        
                        <div class="cancel-reason hidden">
                            <label class="block text-gray-700 text-xs font-bold mb-1">Alasan Cancel *</label>
                            <textarea class="w-full border p-2 rounded text-sm border-red-300" rows="2" placeholder="Jelaskan alasan pembatalan..."></textarea>
                        </div>
                    </div>
                `;
            }

            taskContainer.insertAdjacentHTML('beforeend', fieldsHTML);
        }

        function autoTimestamp(input, type) {
            if (input.files && input.files[0]) {
                const now = new Date();
                const timeString = now.toTimeString().slice(0, 5);
                const taskBlock = input.closest('.task-block');

                if (type === 'before') {
                    taskBlock.querySelector('.time-before').value = timeString;
                } else if (type === 'after') {
                    taskBlock.querySelector('.time-after').value = timeString;
                } else if (type === 'check') {
                    taskBlock.querySelector('.time-check').value = timeString;
                }
            }
        }

        function checkStatusCancel(selectElement) {
            const taskBlock = selectElement.closest('.task-block');
            const reasonDiv = taskBlock.querySelector('.cancel-reason');

            if (selectElement.value === 'Cancel') {
                reasonDiv.classList.remove('hidden');
                reasonDiv.querySelector('textarea').required = true;
            } else {
                reasonDiv.classList.add('hidden');
                reasonDiv.querySelector('textarea').required = false;
            }
        }

        function toggleFields(selectElement) {
            const categoryBlock = selectElement.closest('.category-block');
            const taskContainer = categoryBlock.querySelector('.task-container');
            taskContainer.innerHTML = '';

            const categoryId = categoryBlock.id.split('-')[1];
            addTaskBlock(categoryId);
            checkPicTokoVisibility();
        }

        // --- DRAFT QUEUE MANAGEMENT ---

        function getDraftQueue() {
            const drafts = localStorage.getItem('maintenanceDrafts');
            return drafts ? JSON.parse(drafts) : [];
        }

        function saveDraftQueue(drafts) {
            localStorage.setItem('maintenanceDrafts', JSON.stringify(drafts));
        }

        function loadDraftQueue() {
            const drafts = getDraftQueue();
            updateDraftButton(drafts.length);
        }

        function updateDraftButton(count) {
            const btn = document.getElementById('draftBtn');
            if (count > 0) {
                btn.innerHTML = `📋 Lihat Draft (${count}/${MAX_DRAFTS})`;
                btn.classList.remove('bg-yellow-500');
                btn.classList.add('bg-orange-500');
            } else {
                btn.innerHTML = '💾 Save Draft';
                btn.classList.add('bg-yellow-500');
                btn.classList.remove('bg-orange-500');
            }
        }

        function toggleDraftQueue() {
            const drafts = getDraftQueue();
            if (drafts.length === 0) {
                saveNewDraft();
                return;
            }

            const modal = document.getElementById('draftModal');
            const list = document.getElementById('draftList');
            document.getElementById('draftCount').textContent = drafts.length;

            list.innerHTML = drafts.map((draft, index) => `
                <div class="border p-3 rounded flex justify-between items-center">
                    <div>
                        <p class="font-semibold">${draft.outlet}</p>
                        <p class="text-xs text-gray-500">${draft.date} | ${draft.taskCount} Task</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadDraft(${index})" class="text-blue-500 text-sm hover:underline">Load</button>
                        <button onclick="deleteDraft(${index})" class="text-red-500 text-sm hover:underline">Hapus</button>
                    </div>
                </div>
            `).join('');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeDraftModal() {
            const modal = document.getElementById('draftModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function saveNewDraft() {
            const data = collectData(false); // false = don't validate strictly
            if (!data) return;

            const drafts = getDraftQueue();
            if (drafts.length >= MAX_DRAFTS) {
                alert(`Maksimal ${MAX_DRAFTS} draft! Hapus draft lama terlebih dahulu.`);
                closeDraftModal();
                return;
            }

            const draft = {
                ...data,
                id: Date.now(),
                date: new Date().toLocaleString('id-ID'),
                taskCount: data.entries.length
            };

            drafts.push(draft);
            saveDraftQueue(drafts);
            updateDraftButton(drafts.length);
            closeDraftModal();
            alert("Draft berhasil disimpan!");
        }

        function loadDraft(index) {
            const drafts = getDraftQueue();
            const draft = drafts[index];

            document.getElementById('outlet').value = draft.outlet;
            document.getElementById('petugas').value = draft.petugas;
            document.getElementById('picToko').value = draft.picToko || '';

            // Load categories and tasks (simplified - can be enhanced)
            alert("Draft loaded! (Fitur load lengkap dapat dikembangkan)");
            closeDraftModal();
        }

        function deleteDraft(index) {
            const drafts = getDraftQueue();
            drafts.splice(index, 1);
            saveDraftQueue(drafts);
            updateDraftButton(drafts.length);
            toggleDraftQueue(); // Refresh modal
        }

        // --- DATA COLLECTION & SUBMISSION ---

        function collectData(validate = true) {
            const outlet = document.getElementById('outlet').value;
            const petugas = document.getElementById('petugas').value;
            const picToko = document.getElementById('picToko').value;

            if (!outlet || !petugas) {
                alert("Outlet dan Nama Petugas wajib diisi!");
                return null;
            }

            const blocks = document.querySelectorAll('.category-block');
            let entries = [];

            blocks.forEach(block => {
                const select = block.querySelector('.cat-select');
                const category = select.value;
                if (!category) return;

                const categoryName = select.options[select.selectedIndex].text;
                const taskBlocks = block.querySelectorAll('.task-block');

                taskBlocks.forEach(taskBlock => {
                    const task = taskBlock.querySelector('.task-input').value;
                    const status = taskBlock.querySelector('.status-select').value;

                    if (validate && !task) {
                        alert("Isi Task pada salah satu kategori!");
                        throw new Error("Task kosong");
                    }

                    let entry = {
                        category: categoryName,
                        task: task,
                        status: status
                    };

                    const timeBefore = taskBlock.querySelector('.time-before');
                    const timeAfter = taskBlock.querySelector('.time-after');
                    const timeCheck = taskBlock.querySelector('.time-check');

                    if (category === '1' || category === '2') {
                        entry.timeStart = timeBefore ? timeBefore.value : '-';
                        entry.timeEnd = timeAfter ? timeAfter.value : '-';
                        entry.photoBefore = taskBlock.querySelector('.photo-before').files.length > 0 ? "Ada" : "-";
                        entry.photoAfter = taskBlock.querySelector('.photo-after').files.length > 0 ? "Ada" : "-";
                    } else if (category === '3') {
                        entry.timeStart = timeCheck ? timeCheck.value : '-';
                        entry.timeEnd = '-';
                        entry.photoCheck = taskBlock.querySelector('.photo-check').files.length > 0 ? "Ada" : "-";
                    }

                    entries.push(entry);
                });
            });

            if (validate && entries.length === 0) {
                alert("Pilih minimal satu kategori dan isi task!");
                return null;
            }

            return {
                outlet,
                petugas,
                picToko,
                entries,
                timestamp: new Date().toISOString()
            };
        }

        function sendData() {
            const data = collectData();
            if (!data) return;

            const btn = document.querySelector('button[onclick="saveNewDraft()"]');
            if (btn) {
                btn.innerText = "Menyimpan...";
                btn.disabled = true;
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
                .then(response => {
                    alert("Data berhasil disimpan ke Spreadsheet!");
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Gagal menyimpan. Cek koneksi atau URL Script.");
                })
                .finally(() => {
                    if (btn) {
                        btn.innerText = "Simpan Draft Baru";
                        btn.disabled = false;
                    }
                });
        }

        function resetForm() {
            if (confirm("Apakah Anda yakin ingin mereset formulir?")) {
                document.getElementById('mainForm').reset();
                document.getElementById('categoriesContainer').innerHTML = '';
                categoryCount = 0;
                taskCount = 0;
                addCategoryBlock();
                updateReportHeader();
            }
        }

        // --- GENERATE REPORT (PDF + PRINT) ---

        function generateReport() {
            const data = collectData();
            if (!data) return;

            // Update report header with current data
            updateReportHeader();
            document.getElementById('signPetugas').textContent = data.petugas;
            document.getElementById('signPicToko').textContent = data.picToko || '_________________';

            // Show signature section for print
            document.querySelector('.print\\:block').classList.remove('hidden');

            // Show dialog for choice
            const choice = confirm("Klik OK untuk Download PDF\nKlik Cancel untuk Print langsung");

            if (choice) {
                convertPDF(data);
            } else {
                window.print();
            }

            // Send to Google Sheets
            sendData();
        }

        function convertPDF(data) {
            const element = document.getElementById('printableArea');
            const now = new Date();
            const filename = `Laporan_${data.outlet.replace(/\|/g, '_')}_${now.toISOString().slice(0, 19).replace(/:/g, "-")}.pdf`;

            const opt = {
                margin: 0.5,
                filename: filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            document.querySelectorAll('.no-print').forEach(el => el.style.display = 'none');

            html2pdf().set(opt).from(element).save().then(() => {
                document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
            });
        }
    </script>
</body>

</html>
